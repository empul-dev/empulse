{% extends "base.html" %}
{% block title %}History — Empulse{% endblock %}

{% block content %}
<div class="section-header">
    <h2>History</h2>
</div>

<div class="history-toolbar" id="history-filters">
    <div class="history-toolbar-group">
        <select name="user_id" class="filter-select"
                hx-get="/api/history-table"
                hx-trigger="change"
                hx-target="#history-table"
                hx-include="#history-filters">
            <option value="">All users</option>
            {% for user in users %}
            <option value="{{ user.emby_user_id }}">{{ user.username }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="history-toolbar-group filter-buttons">
        <button class="filter-btn active" data-filter="item_type" data-value=""
                aria-pressed="true">All</button>
        <button class="filter-btn" data-filter="item_type" data-value="Movie"
                aria-pressed="false">Movies</button>
        <button class="filter-btn" data-filter="item_type" data-value="Episode"
                aria-pressed="false">TV Shows</button>
        <button class="filter-btn" data-filter="item_type" data-value="Audio"
                aria-pressed="false">Music</button>
    </div>

    <div class="history-toolbar-group filter-buttons">
        <button class="filter-btn active" data-filter="play_method" data-value=""
                aria-pressed="true">All</button>
        <button class="filter-btn direct-play" data-filter="play_method" data-value="DirectPlay"
                aria-pressed="false">Direct Play</button>
        <button class="filter-btn direct-stream" data-filter="play_method" data-value="DirectStream"
                aria-pressed="false">Direct Stream</button>
        <button class="filter-btn transcode" data-filter="play_method" data-value="Transcode"
                aria-pressed="false">Transcode</button>
    </div>

    <div class="history-toolbar-group">
        <button class="toolbar-btn" data-action="refresh" title="Refresh">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
            Refresh
        </button>
        <button class="toolbar-btn" data-action="export-csv" title="Export CSV">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
            CSV
        </button>
        <button class="toolbar-btn" data-action="export-json" title="Export JSON">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
            JSON
        </button>
    </div>

    <div class="history-toolbar-group history-search">
        <input type="search" name="search" placeholder="Search..."
               class="search-input"
               hx-get="/api/history-table"
               hx-trigger="input changed delay:300ms, search"
               hx-target="#history-table"
               hx-include="#history-filters">
    </div>

    <input type="hidden" name="item_type" value="">
    <input type="hidden" name="play_method" value="">
    <input type="hidden" name="sort_by" value="date">
    <input type="hidden" name="sort_order" value="desc">
</div>

<div id="history-table" aria-live="polite"
     hx-get="/api/history-table"
     hx-trigger="load"
     hx-swap="innerHTML">
</div>
{% endblock %}

{% block scripts %}
<script nonce="{{ csp_nonce }}">
function exportHistory(format) {
    var params = new URLSearchParams();
    params.set('format', format);
    var uid = document.querySelector('#history-filters select[name="user_id"]').value;
    var itype = document.querySelector('#history-filters input[name="item_type"]').value;
    var pm = document.querySelector('#history-filters input[name="play_method"]').value;
    var s = document.querySelector('#history-filters input[name="search"]').value;
    if (uid) params.set('user_id', uid);
    if (itype) params.set('item_type', itype);
    if (pm) params.set('play_method', pm);
    if (s) params.set('search', s);
    window.location.href = '/api/export/history?' + params.toString();
}

// Delegate filter-btn and toolbar-btn clicks
document.getElementById('history-filters').addEventListener('click', function(e) {
    var filterBtn = e.target.closest('.filter-btn');
    if (filterBtn) {
        var group = filterBtn.closest('.filter-buttons');
        group.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); b.setAttribute('aria-pressed', 'false'); });
        filterBtn.classList.add('active');
        filterBtn.setAttribute('aria-pressed', 'true');
        var name = filterBtn.dataset.filter;
        document.querySelector('#history-filters input[name="' + name + '"]').value = filterBtn.dataset.value;
        htmx.trigger(document.querySelector('#history-filters .search-input'), 'search');
        return;
    }
    var toolbarBtn = e.target.closest('.toolbar-btn[data-action]');
    if (toolbarBtn) {
        var action = toolbarBtn.dataset.action;
        if (action === 'refresh') htmx.trigger(document.querySelector('#history-filters .search-input'), 'search');
        else if (action === 'export-csv') exportHistory('csv');
        else if (action === 'export-json') exportHistory('json');
    }
});

// Delegate sort, row expand, and link clicks on htmx-swapped #history-table
document.getElementById('history-table').addEventListener('click', function(e) {
    if (e.target.closest('a') && e.target.closest('.history-row')) return;
    var th = e.target.closest('th.sortable');
    if (th) {
        document.querySelector('#history-filters input[name="sort_by"]').value = th.dataset.col;
        document.querySelector('#history-filters input[name="sort_order"]').value = th.dataset.order;
        htmx.trigger(document.querySelector('#history-filters .search-input'), 'search');
        return;
    }
    var row = e.target.closest('tr.history-row');
    if (!row) return;
    var id = row.dataset.id;
    var detailRow = document.getElementById('detail-' + id);
    var chevron = document.getElementById('chev-' + id);
    var contentEl = document.getElementById('detail-content-' + id);
    if (detailRow.style.display === 'none') {
        document.querySelectorAll('.detail-row').forEach(function(r) {
            if (r.id !== 'detail-' + id) {
                r.style.display = 'none';
                var oid = r.id.replace('detail-', '');
                var oc = document.getElementById('chev-' + oid);
                var or2 = r.previousElementSibling;
                if (oc) oc.classList.remove('expanded');
                if (or2) or2.classList.remove('expanded');
            }
        });
        detailRow.style.display = 'table-row';
        chevron.classList.add('expanded');
        row.classList.add('expanded');
        if (contentEl.querySelector('.detail-loading')) {
            fetch('/api/history-detail/' + encodeURIComponent(id))
                .then(function(r) { return r.text(); })
                .then(function(h) { contentEl.textContent = ''; contentEl.insertAdjacentHTML('afterbegin', h); htmx.process(contentEl); });
        }
    } else {
        detailRow.style.display = 'none';
        chevron.classList.remove('expanded');
        row.classList.remove('expanded');
    }
});
</script>
{% endblock %}
