{% if items %}
<div class="recently-added-grid">
    {% for item in items %}
    <a href="/item/{{ item.Id }}" class="recently-added-item">
        <div class="recently-added-poster">
            <img src="/api/img/{{ item.Id }}" alt="" loading="lazy">
        </div>
        <div class="recently-added-title">{{ item.Name or "Unknown" }}</div>
        <div class="recently-added-meta">
            {% if item.ProductionYear %}{{ item.ProductionYear }}{% endif %}
            {% if item.Type %}<span class="recently-added-type">{{ item.Type }}</span>{% endif %}
        </div>
    </a>
    {% endfor %}
</div>
{% else %}
<p class="empty-state">No recently added media available.</p>
{% endif %}
