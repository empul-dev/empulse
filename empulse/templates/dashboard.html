{% extends "base.html" %}
{% block title %}Dashboard — Empulse{% endblock %}

{% block content %}
<div class="section-header">
    <h2>Activity</h2>
</div>
<div id="now-playing"
     hx-get="/api/now-playing"
     hx-trigger="load, every 10s, refresh-now-playing from:body"
     hx-swap="innerHTML">
</div>

<div class="section-header">
    <h2>Watch Statistics</h2>
    <div class="stat-controls">
        <div class="toggle-group" id="metric-toggle">
            <button class="toggle-btn active" data-value="plays"
                    hx-get="/api/stats-cards?metric=plays"
                    hx-target="#stats-cards" hx-swap="innerHTML"
                    hx-include="#days-input"
                    onclick="setToggle(this)">Play Count</button>
            <button class="toggle-btn" data-value="duration"
                    hx-get="/api/stats-cards?metric=duration"
                    hx-target="#stats-cards" hx-swap="innerHTML"
                    hx-include="#days-input"
                    onclick="setToggle(this)">Play Duration</button>
        </div>
        <span class="stat-controls-label">Last</span>
        <input type="number" id="days-input" name="days" value="30" min="1" max="365"
               class="days-input"
               hx-get="/api/stats-cards"
               hx-trigger="change"
               hx-target="#stats-cards" hx-swap="innerHTML"
               hx-include="#metric-toggle .active">
        <span class="stat-controls-label">days</span>
    </div>
</div>

<div class="charts-section">
    <div class="charts-grid">
        <div class="chart-card wide">
            <div class="chart-header">Daily Plays</div>
            <div class="chart-body"><canvas id="chart-daily"></canvas></div>
        </div>
        <div class="chart-card">
            <div class="chart-header">Plays by Type</div>
            <div class="chart-body"><canvas id="chart-type"></canvas></div>
        </div>
        <div class="chart-card">
            <div class="chart-header">Plays by Platform</div>
            <div class="chart-body"><canvas id="chart-platform"></canvas></div>
        </div>
    </div>
</div>

<div id="stats-cards"
     hx-get="/api/stats-cards"
     hx-trigger="load, refresh-stats from:body"
     hx-swap="innerHTML">
</div>

<div class="section-header">
    <h2>Recently Added</h2>
    <div class="recently-added-filters">
        <button class="filter-btn active" onclick="loadRecentlyAdded('', this)">All</button>
        <button class="filter-btn" onclick="loadRecentlyAdded('Movie', this)">Movies</button>
        <button class="filter-btn" onclick="loadRecentlyAdded('Episode', this)">Episodes</button>
        <button class="filter-btn" onclick="loadRecentlyAdded('Audio', this)">Music</button>
    </div>
</div>
<div id="recently-added"
     hx-get="/api/recently-added?limit=10"
     hx-trigger="load"
     hx-swap="innerHTML">
</div>
{% endblock %}

{% block scripts %}
<script nonce="{{ csp_nonce }}">
function setToggle(btn) {
    btn.parentElement.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
}

function loadRecentlyAdded(type, btn) {
    btn.parentElement.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    var url = '/api/recently-added?limit=10';
    if (type) url += '&item_type=' + type;
    htmx.ajax('GET', url, '#recently-added');
}
</script>
{% endblock %}
