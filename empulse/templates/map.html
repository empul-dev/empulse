{% extends "base.html" %}
{% block title %}Map — Empulse{% endblock %}

{% block content %}
<div class="section-header">
    <h2>Activity Map</h2>
</div>
<div id="map" style="height: 500px; border-radius: 8px; margin-bottom: 1rem;"></div>
<p class="empty-state" id="map-empty" style="display:none">No location data available. Geo-location is resolved from IP addresses when playback history is recorded.</p>
{% endblock %}

{% block scripts %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
(function() {
    var map = L.map('map').setView([30, 0], 2);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors',
        maxZoom: 18,
    }).addTo(map);

    fetch('/api/locations')
        .then(function(r) { return r.json(); })
        .then(function(locations) {
            if (!locations.length) {
                document.getElementById('map-empty').style.display = '';
                return;
            }
            var bounds = [];
            locations.forEach(function(loc) {
                var lat = loc.latitude;
                var lng = loc.longitude;
                if (lat === 0 && lng === 0) return;

                var popup = '<b>' + (loc.city || '') + (loc.city && loc.country ? ', ' : '') + (loc.country || '') + '</b>';
                if (loc.user_name) popup += '<br>User: ' + loc.user_name;
                if (loc.item_name) popup += '<br>Last: ' + loc.item_name;
                if (loc.started_at) popup += '<br>' + loc.started_at.substring(0, 16);

                L.marker([lat, lng]).addTo(map).bindPopup(popup);
                bounds.push([lat, lng]);
            });
            if (bounds.length) {
                map.fitBounds(bounds, { padding: [30, 30], maxZoom: 8 });
            }
        });
})();
</script>
{% endblock %}
