<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Emtulli{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body>
    <nav class="container-fluid">
        <ul>
            <li><strong><a href="/" class="nav-brand">Emtulli</a></strong></li>
        </ul>
        <ul>
            <li><a href="/" {% if active == 'dashboard' %}class="active"{% endif %}>Dashboard</a></li>
            <li><a href="/history" {% if active == 'history' %}class="active"{% endif %}>History</a></li>
            <li><a href="/users" {% if active == 'users' %}class="active"{% endif %}>Users</a></li>
            <li><a href="/libraries" {% if active == 'libraries' %}class="active"{% endif %}>Libraries</a></li>
            <li><a href="/settings" {% if active == 'settings' %}class="active"{% endif %}>Settings</a></li>
        </ul>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="container">
        <small>Emtulli — Emby monitoring</small>
    </footer>

    <script src="/static/js/app.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
